name: 퀀터스 Live Web 자동화 테스트


on:
  workflow_dispatch: # 수동 실행을 위한 이벤트 추가
  schedule:
    # cron 표현식을 사용하여 3시간마다 실행합니다.
    - cron: '0 */6 * * *'


jobs:
  check-token-validity:
    runs-on: ubuntu-latest
    outputs:
      token_valid: ${{ steps.token-check.outputs.token_valid }}
    
    steps:
      - name: Checkout 코드 가져오기
        uses: actions/checkout@v4
      
      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 필요한 패키지 설치
        run: |
          pip install -r requirements.txt
      
      - name: 리프레시 토큰 유효성 확인
        id: token-check
        run: |
          python -m src.utils.refresh_token_test
          echo "token_valid=true" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: 토큰 검증 결과 확인
        if: steps.token-check.outcome == 'failure'
        run: |
          echo "리프레시 토큰이 만료되었습니다. 테스트를 실행하지 않습니다."
          echo "token_valid=false" >> $GITHUB_OUTPUT

  run-quantus-tests:
    needs: check-token-validity
    if: needs.check-token-validity.outputs.token_valid == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 코드 가져오기
        uses: actions/checkout@v4

      - name: Docker 이미지 빌드
        run: docker build -t quantus-tests .

      - name: 테스트 실행
        run: docker run --rm quantus-tests